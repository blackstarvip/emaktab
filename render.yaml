services:
  - type: web
    name: emaktab-bot
    runtime: python
    region: frankfurt

    buildCommand: |
      apt-get update -y && apt-get install -y \
        chromium chromium-driver \
        libglib2.0-0 libnss3 libgconf-2-4 libfontconfig1 \
        libx11-xcb1 libxcb-dri3-0 libxcomposite1 libxcursor1 \
        libxdamage1 libxfixes3 libxi6 libxrandr2 libxrender1 \
        libxss1 libxtst6 libasound2 libatk-bridge2.0-0 libgtk-3-0
      pip install -r requirements.txt

    startCommand: gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT

    envVars:
      - key: BOT_API_KEY
        sync: false          # Render Dashboard dan qo'lda kiriting!
      - key: EMAKTAB_URL
        value: https://login.emaktab.uz
      - key: LOGIN_TIMEOUT
        value: "15"
      - key: PYTHONUNBUFFERED
        value: "1"

    healthCheckPath: /health
    plan: free
